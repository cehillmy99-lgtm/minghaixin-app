<!-- 錯誤偵測攔截器 -->
<script>
  function mhxShowError(msg) {
    var box = document.getElementById('mhx-error-box');
    if (!box) {
      box = document.createElement('div');
      box.id = 'mhx-error-box';
      box.style.cssText = "position:fixed; top:0; left:0; right:0; background:#FEE2E2; color:#991B1B; padding:16px; font-size:13px; font-family:monospace; white-space:pre-wrap; z-index:99999; max-height:80vh; overflow:auto; border-bottom:3px solid #DC2626;";
      (document.body || document.documentElement).appendChild(box);
    }
    box.style.display = 'block';
    box.textContent = "⚠ 發生錯誤，請截圖這段文字給我：\n\n" + msg;
  }
  window.onerror = function (message, source, lineno, colno, error) {
    mhxShowError(message + "\n\n出錯檔案: " + source + "\n(line " + lineno + ", col " + colno + ")");
  };
  window.addEventListener('unhandledrejection', function (e) {
    mhxShowError("Promise error: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
</script>

/* ============================== 計算邏輯 ============================== */

function teamMetrics(team) {
  const revenueTotal = team.revenueEntries.reduce(function(s, r) { return s + numOr0(r.amount); }, 0);
  const shipping = numOr0(team.customerShipping);
  const taxIncludedRevenue = team.revenueEntries.filter(function(r) { return r.taxIncluded; }).reduce(function(s, r) { return s + numOr0(r.amount); }, 0) + shipping;
  const slipperQty = team.purchases.reduce(function(s, p) { return s + numOr0(p.qty); }, 0);
  const purchasesBRL = team.purchases.reduce(function(s, p) { return s + numOr0(p.brl); }, 0);

  const depositedBRL = team.remittances.reduce(function(s, r) { return s + numOr0(r.brlOut); }, 0);
  const depositedTWD = team.remittances.reduce(function(s, r) { return s + numOr0(r.brlOut) * numOr0(r.rate); }, 0);
  const avgRate = depositedBRL > 0 ? depositedTWD / depositedBRL : 0;

  const purchasesTWD = purchasesBRL * avgRate;
  const helperGross = slipperQty * 30;
  const deductionsTotal = team.helperDeductions.reduce(function(s, d) { return s + numOr0(d.amount); }, 0);
  const helperNet = helperGross - deductionsTotal;

  const currentBalanceBRL = depositedBRL - purchasesBRL;
  const currentBalanceTWD = currentBalanceBRL * avgRate;

  return {
    revenueTotal: revenueTotal, taxIncludedRevenue: taxIncludedRevenue, slipperQty: slipperQty, purchasesBRL: purchasesBRL, purchasesTWD: purchasesTWD, helperGross: helperGross, deductionsTotal: deductionsTotal, helperNet: helperNet,
    depositedBRL: depositedBRL, depositedTWD: depositedTWD, avgRate: avgRate, currentBalanceBRL: currentBalanceBRL, currentBalanceTWD: currentBalanceTWD,
  };
}

function monthAggregate(teams, companyExpenses, year, month) {
  const monthTeams = teams.filter(function(t) { return t.year === year && t.month === month; });
  const monthExpenses = companyExpenses.filter(function(e) { return e.year === year && e.month === month; });

  let revenueTotal = 0, taxIncludedRevenue = 0, purchasesTWD = 0, helperNetTotal = 0;
  monthTeams.forEach(function(t) {
    const m = teamMetrics(t);
    revenueTotal += m.revenueTotal;
    taxIncludedRevenue += m.taxIncludedRevenue;
    purchasesTWD += m.purchasesTWD;
    helperNetTotal += m.helperNet;
  });
  const companyExpenseTotal = monthExpenses.reduce(function(s, e) { return s + numOr0(e.amount); }, 0);
  const totalExpense = companyExpenseTotal + purchasesTWD + helperNetTotal;
  const netProfit = revenueTotal - totalExpense;
  const taxAmount = taxIncludedRevenue * 0.05;
  const purchaseRatio = revenueTotal > 0 ? purchasesTWD / revenueTotal : 0;
  const companyExpenseRatio = revenueTotal > 0 ? companyExpenseTotal / revenueTotal : 0;
  const combinedRatio = purchaseRatio + companyExpenseRatio;
  let status = "優良";
  if (combinedRatio > 0.8) status = "欠佳";
  else if (combinedRatio > 0.6) status = "尚可";

  return { monthTeams: monthTeams, monthExpenses: monthExpenses, revenueTotal: revenueTotal, taxIncludedRevenue: taxIncludedRevenue, purchasesTWD: purchasesTWD, helperNetTotal: helperNetTotal, companyExpenseTotal: companyExpenseTotal, totalExpense: totalExpense, netProfit: netProfit, taxAmount: taxAmount, purchaseRatio: purchaseRatio, companyExpenseRatio: companyExpenseRatio, status: status };
}

/* ============================== 共用 UI 元件 ============================== */

function Btn({ children, onClick, variant = "primary", size = "md", disabled }) {
  const base = {
    display: "inline-flex", alignItems: "center", gap: 6, borderRadius: 8, fontWeight: 600,
    cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? 0.5 : 1,
    fontSize: size === "sm" ? 13 : 14, padding: size === "sm" ? "5px 10px" : "8px 16px",
  };
  const variants = {
    primary: { background: C.text, color: "#FFFFFF", border: `1px solid ${C.text}` },
    outline: { background: "transparent", color: C.text, border: `1px solid ${C.border}` },
    ghost: { background: "transparent", color: C.muted, border: "1px solid transparent" },
    danger: { background: "transparent", color: C.bad, border: `1px solid ${C.bad}` },
  };
  return <button type="button" disabled={disabled} onClick={onClick} style={Object.assign({}, base, variants[variant])}>{children}</button>;
}

function Field({ label, children }) {
  return (
    <label style={{ display: "flex", flexDirection: "column", gap: 4, fontSize: 13, color: C.text }}>
      <span style={{ fontWeight: 600 }}>{label}</span>
      {children}
    </label>
  );
}

const inputStyle = { border: `1px solid ${C.border}`, borderRadius: 6, padding: "6px 8px", color: C.text, background: "#FFFFFF", fontSize: 14, outline: "none" };
function Input(props) { return <input {...props} style={Object.assign({}, inputStyle, props.style || {})} />; }
function Select(props) { return <select {...props} style={Object.assign({}, inputStyle, props.style || {})} />; }

function Card({ children, style }) {
  return <div style={Object.assign({ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 16, boxShadow: "0 1px 3px rgba(17,24,39,0.06)" }, style)}>{children}</div>;
}

function SectionTitle({ icon, children }) {
  return (
    <h2 style={{ display: "flex", alignItems: "center", gap: 8, color: C.text, fontSize: 18, fontWeight: 800, margin: "0 0 12px 0" }}>
      {icon} {children}
    </h2>
  );
}

function Table({ headers, children }) {
  return (
    <div style={{ overflowX: "auto" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
        <thead>
          <tr>{headers.map(function(h, i) { return <th key={i} style={{ textAlign: "left", padding: "6px 8px", borderBottom: `2px solid ${C.border}`, color: C.text, whiteSpace: "nowrap" }}>{h}</th>; })}</tr>
        </thead>
        <tbody>{children}</tbody>
      </table>
    </div>
  );
}
function Td({ children, style, colSpan }) { return <td colSpan={colSpan} style={Object.assign({ padding: "6px 8px", borderBottom: `1px solid ${C.border}`, color: C.text }, style)}>{children}</td>; }

function YearMonthPicker({ year, month, onYear, onMonth, years }) {
  return (
    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
      <Select value={year} onChange={function(e) { onYear(Number(e.target.value)); }}>
        {years.map(function(y) { return <option key={y} value={y}>{y} 年</option>; })}
      </Select>
      <Select value={month} onChange={function(e) { onMonth(Number(e.target.value)); }}>
        {Array.from({ length: 12 }, function(_, i) { return i + 1; }).map(function(m) { return <option key={m} value={m}>{monthName(m)}</option>; })}
      </Select>
    </div>
  );
}

function TeamSelector({ teams, year, month, selectedId, onSelect, onCreate }) {
  const monthTeams = teams.filter(function(t) { return t.year === year && t.month === month; });
  useEffect(function() {
    if (monthTeams.length && !monthTeams.find(function(t) { return t.id === selectedId; })) {
      onSelect(monthTeams[0].id);
    }
  }, [year, month, teams.length]);

  if (monthTeams.length === 0) {
    return (
      <Card style={{ marginBottom: 16 }}>
        <div style={{ color: C.muted, marginBottom: 10 }}>本月尚未建立任何團，請先新增一團。</div>
        <Btn onClick={onCreate}><Plus size={16} /> 新增一團</Btn>
      </Card>
    );
  }

  return (
    <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 16, flexWrap: "wrap" }}>
      <Select value={selectedId || ""} onChange={function(e) { onSelect(e.target.value); }}>
        {monthTeams.map(function(t) { return <option key={t.id} value={t.id}>{t.name || "（未命名團）"}</option>; })}
      </Select>
      <Btn variant="outline" size="sm" onClick={onCreate}><Plus size={14} /> 新增一團</Btn>
    </div>
  );
}

/* ============================== 團記錄 ============================== */

function TeamsTab({ teams, setTeams, years }) {
  const now = new Date();
  const [year, setYear] = useState(years[years.length - 1] || now.getFullYear());
  const [month, setMonth] = useState(now.getMonth() + 1);
  const filtered = teams.filter(function(t) { return t.year === year && t.month === month; });
  const monthTotal = filtered.reduce(function(s, t) { return s + teamMetrics(t).revenueTotal; }, 0);

  const addTeam = function() { setTeams(teams.concat([emptyTeam(year, month)])); };
  const updateTeam = function(t) { setTeams(teams.map(function(x) { return x.id === t.id ? t : x; })); };
  const deleteTeam = function(id) { setTeams(teams.filter(function(x) { return x.id !== id; })); };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 12 }}>
        <YearMonthPicker year={year} month={month} onYear={setYear} onMonth={setMonth} years={years} />
        <Btn onClick={addTeam}><Plus size={16} /> 新增一團</Btn>
      </div>
      <div style={{ marginBottom: 12, fontSize: 14, color: C.text, fontWeight: 700 }}>
        {year} 年 {month} 月　共 {filtered.length} 團　營業額合計 NT$ {fmt(monthTotal)}
      </div>
      {filtered.length === 0 && <Card><span style={{ color: C.muted }}>本月尚無紀錄，點擊「新增一團」開始輸入。</span></Card>}
      {filtered.map(function(t) {
        return <TeamRevenueCard key={t.id} team={t} onChange={updateTeam} onDelete={deleteTeam} />;
      })}
    </div>
  );
}

function TeamRevenueCard({ team, onChange, onDelete }) {
  const [open, setOpen] = useState(true);
  const m = teamMetrics(team);
  const update = function(patch) { onChange(Object.assign({}, team, patch)); };
  const addRevenue = function() { update({ revenueEntries: team.revenueEntries.concat([{ id: uid(), amount: "", taxIncluded: false }]) }); };
  const updRevenue = function(id, patch) { update({ revenueEntries: team.revenueEntries.map(function(r) { return r.id === id ? Object.assign({}, r, patch) : r; }) }); };
  const delRevenue = function(id) { update({ revenueEntries: team.revenueEntries.filter(function(r) { return r.id !== id; }) }); };

  return (
    <Card style={{ marginBottom: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }} onClick={function() { setOpen(!open); }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          {open ? <ChevronDown size={18} color={C.text} /> : <ChevronRight size={18} color={C.text} />}
          <strong style={{ color: C.text, fontSize: 15 }}>{team.name || "（未命名團）"}</strong>
        </div>
        <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
          <span style={{ fontSize: 13, color: C.text }}>NT$ {fmt(m.revenueTotal)}</span>
          <Btn variant="danger" size="sm" onClick={function(e) { e.stopPropagation(); onDelete(team.id); }}><Trash2 size={14} /> 刪除</Btn>
        </div>
      </div>
      {open && (
        <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            <Field label="團名/備註"><Input value={team.name} onChange={function(e) { update({ name: e.target.value }); }} placeholder="例：7月第1團" /></Field>
          </div>
          <Table headers={["金額", "含稅？", ""]}>
            {team.revenueEntries.map(function(r) {
              return (
                <tr key={r.id}>
                  <Td><Input type="number" value={r.amount} onChange={function(e) { updRevenue(r.id, { amount: e.target.value }); }} placeholder="0" style={{ width: 140 }} /></Td>
                  <Td><label style={{ display: "flex", alignItems: "center", gap: 6 }}><input type="checkbox" checked={r.taxIncluded} onChange={function(e) { updRevenue(r.id, { taxIncluded: e.target.checked }); }} /> 含稅</label></Td>
                  <Td><Btn variant="ghost" size="sm" onClick={function() { delRevenue(r.id); }}><Trash2 size={14} /></Btn></Td>
                </tr>
              );
            })}
          </Table>
          <Btn variant="outline" size="sm" onClick={addRevenue}><Plus size={14} /> 新增一筆營業額</Btn>
          <Field label="客人總運費（固定含稅）"><Input type="number" value={team.customerShipping} onChange={function(e) { update({ customerShipping: e.target.value }); }} placeholder="0" style={{ width: 180 }} /></Field>
          <div style={{ fontSize: 13, color: C.text }}>
            營業額合計：<strong>NT$ {fmt(m.revenueTotal)}</strong>（含稅總額：NT$ {fmt(m.taxIncludedRevenue)}，含運費）
          </div>
        </div>
      )}
    </Card>
  );
}

function BrazilTab({ teams, setTeams, years }) {
  const now = new Date();
  const [year, setYear] = useState(years[years.length - 1] || now.getFullYear());
  const [month, setMonth] = useState(now.getMonth() + 1);
  const [selectedId, setSelectedId] = useState(null);

  const team = teams.find(function(t) { return t.id === selectedId; });
  const updateTeam = function(patch) { setTeams(teams.map(function(t) { return t.id === team.id ? Object.assign({}, t, patch) : t; })); };
  const createTeam = function() {
    const nt = emptyTeam(year, month);
    setTeams(teams.concat([nt]));
    setSelectedId(nt.id);
  };

  if (!team) {
    return (
      <div>
        <div style={{ marginBottom: 12 }}><YearMonthPicker year={year} month={month} onYear={setYear} onMonth={setMonth} years={years} /></div>
        <TeamSelector teams={teams} year={year} month={month} selectedId={selectedId} onSelect={setSelectedId} onCreate={createTeam} />
      </div>
    );
  }

  const m = teamMetrics(team);
  const addPurchase = function() { updateTeam({ purchases: team.purchases.concat([{ id: uid(), item: "Havaianas", vendor: "Site", customVendor: "", qty: "", brl: "" }]) }); };

function RatioBadge({ ratio }) {
  const pct = ratio * 100;
  let status = "優良", color = C.good, symbol = "✓";
  if (pct > 60) { status = "欠佳"; color = C.bad; symbol = "✗"; }
  else if (pct > 40) { status = "尚可"; color = C.ok; symbol = "!"; }
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "3px 10px", borderRadius: 999, background: C.bg, border: `1px solid ${C.border}`, color: color, fontWeight: 700, fontSize: 12 }}>
      {symbol} {status}
    </span>
  );
}

function RatioRow({ label, ratio }) {
  const pct = Math.min(ratio * 100, 100);
  let barColor = C.good;
  if (ratio * 100 > 60) barColor = C.bad;
  else if (ratio * 100 > 40) barColor = C.ok;
  return (
    <div style={{ marginBottom: 18 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <span style={{ color: C.text, fontWeight: 700, fontSize: 14 }}>{label}</span>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <RatioBadge ratio={ratio} />
          <span style={{ color: C.text, fontWeight: 700, fontSize: 13 }}>{(ratio * 100).toFixed(1)}%</span>
        </div>
      </div>
      <div style={{ width: "100%", height: 8, borderRadius: 999, background: "#EEF0F2" }}>
        <div style={{ width: pct + "%", height: "100%", borderRadius: 999, background: barColor, transition: "width .3s" }} />
      </div>
    </div>
  );
}

function StatCard({ label, value, sub, tone }) {
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "16px 18px" }}>
      <div style={{ fontSize: 13, color: C.muted, fontWeight: 600, marginBottom: 8 }}>{label}</div>
      <div style={{ fontSize: 26, fontWeight: 800, color: tone || C.text }}>{value}</div>
      {sub && <div style={{ fontSize: 12, color: C.muted, marginTop: 6 }}>{sub}</div>}
    </div>
  );
}

/* ============================== 年度比較 ============================== */

function CompareTab({ teams, expenses, years }) {
  const now = new Date();
  const [year, setYear] = useState(years[years.length - 1] || now.getFullYear());
  const [compareYear, setCompareYear] = useState(years[0] || now.getFullYear());
  const [compareMonth, setCompareMonth] = useState(now.getMonth() + 1);

  const monthsData = Array.from({ length: 12 }, function(_, i) { return i + 1; }).map(function(mo) {
    return { month: monthName(mo), monthNum: mo, revenue: monthAggregate(teams, expenses, year, mo).revenueTotal };
  });

  const withGrowth = monthsData.map(function(d, i) {
    const prev = i > 0 ? monthsData[i - 1].revenue : null;
    const growth = prev && prev > 0 ? ((d.revenue - prev) / prev) * 100 : null;
    return Object.assign({}, d, { growth: growth });
  });

  const thisMonthAgg = monthAggregate(teams, expenses, year, compareMonth);
  const otherMonthAgg = monthAggregate(teams, expenses, compareYear, compareMonth);
  const yoyGrowth = otherMonthAgg.revenueTotal > 0 ? ((thisMonthAgg.revenueTotal - otherMonthAgg.revenueTotal) / otherMonthAgg.revenueTotal) * 100 : null;

  return (
    <div>
      <Card style={{ marginBottom: 20 }}>
        <SectionTitle>{year} 年　1–12 月營運看板</SectionTitle>
        <div style={{ marginBottom: 12 }}>
          <Select value={year} onChange={function(e) { setYear(Number(e.target.value)); }}>
            {years.map(function(y) { return <option key={y} value={y}>{y} 年</option>; })}
          </Select>
        </div>
        <div style={{ width: "100%", height: 220, display: "flex", alignItems: "flex-end", gap: 6, borderBottom: `1px solid ${C.border}`, padding: "0 4px" }}>
          {function() {
            var max = Math.max.apply(Math, [1].concat(withGrowth.map(function(d) { return d.revenue; })));
            return withGrowth.map(function(d) {
              return (
                <div key={d.monthNum} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                  <div style={{ fontSize: 10, color: C.muted }}>{d.revenue > 0 ? fmt(d.revenue) : ""}</div>
                  <div style={{ width: "100%", height: Math.max(2, (d.revenue / max) * 170), background: C.text, borderRadius: "3px 3px 0 0" }} />
                  <div style={{ fontSize: 10, color: C.muted }}>{d.monthNum}月</div>
                </div>
              );
            });
          }()}
        </div>
        <Table headers={["月份", "營業額", "與上月成長率"]}>
          {withGrowth.map(function(d) {
            return (
              <tr key={d.monthNum}>
                <Td>{d.month}</Td><Td>NT$ {fmt(d.revenue)}</Td>
                <Td>{d.growth === null ? "—" : <span style={{ color: d.growth >= 0 ? C.good : C.bad, display: "inline-flex", alignItems: "center", gap: 4 }}>{d.growth >= 0 ? <TrendingUp size={14} /> : <TrendingDown size={14} />}{d.growth.toFixed(1)}%</span>}</Td>
              </tr>
            );
          })}
        </Table>
      </Card>
      <Card>
        <SectionTitle>年度同月比較</SectionTitle>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 16 }}>
          <Field label="本期年份"><Select value={year} onChange={function(e) { setYear(Number(e.target.value)); }}>{years.map(function(y) { return <option key={y} value={y}>{y} 年</option>; })}</Select></Field>
          <Field label="比較年份"><Select value={compareYear} onChange={function(e) { setCompareYear(Number(e.target.value)); }}>{years.map(function(y) { return <option key={y} value={y}>{y} 年</option>; })}</Select></Field>
          <Field label="比較月份"><Select value={compareMonth} onChange={function(e) { setCompareMonth(Number(e.target.value)); }}>{Array.from({ length: 12 }, function(_, i) { return i + 1; }).map(function(mo) { return <option key={mo} value={mo}>{monthName(mo)}</option>; })}</Select></Field>
        </div>
        <Table headers={["", year + "/" + compareMonth, compareYear + "/" + compareMonth]}>
          <tr><Td>營業額</Td><Td>NT$ {fmt(thisMonthAgg.revenueTotal)}</Td><Td>NT$ {fmt(otherMonthAgg.revenueTotal)}</Td></tr>
          <tr><Td>淨利</Td><Td>NT$ {fmt(thisMonthAgg.netProfit)}</Td><Td>NT$ {fmt(otherMonthAgg.netProfit)}</Td></tr>
        </Table>
        <div style={{ marginTop: 10, color: C.text }}>年度同月成長率：{yoyGrowth === null ? "—" : <strong style={{ color: yoyGrowth >= 0 ? C.good : C.bad }}>{yoyGrowth.toFixed(1)}%</strong>}</div>
      </Card>
    </div>
  );
}

  { key: "teams", label: "團記錄", emoji: "📝" },
  { key: "brazil", label: "巴西進貨", emoji: "📦" },
  { key: "staff", label: "人事", emoji: "👥" },
  { key: "expenses", label: "公司支出", emoji: "💵" },
  { key: "monthly", label: "月報損益", emoji: "🗓️" },
  { key: "compare", label: "年度比較", emoji: "📈" },
];

function Navbar({ tab, setTab }) {
  return (
    <nav
      className="mhx-nav"
      style={{
        display: "flex", gap: 2, padding: "0 12px", background: NAV.bg,
        overflowX: "auto", whiteSpace: "nowrap", WebkitOverflowScrolling: "touch",
      }}
    >
      {TABS.map(function(t) {
        const active = tab === t.key;
        return (
          <button
            key={t.key}
            onClick={function() { setTab(t.key); }}
            className="mhx-nav-btn"
            style={{
              display: "inline-flex", alignItems: "center", gap: 5, flexShrink: 0,
              padding: "9px 10px 7px 10px", background: "transparent", border: "none", cursor: "pointer",
              color: active ? NAV.active : NAV.inactive, fontWeight: active ? 700 : 600, fontSize: 13,
              borderBottom: active ? `3px solid ${NAV.active}` : "3px solid transparent",
            }}
          >
            <span style={{ fontSize: 14, lineHeight: 1 }}>{t.emoji}</span>
            {t.label}
          </button>
        );
      })}
    </nav>
  );
}

/* ============================== 主程式 ============================== */

function App() {
  const [teams, setTeams] = useState([]);
  const [expenses, setExpenses] = useState([]);
  const [tab, setTab] = useState("overview");
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [saveError, setSaveError] = useState(false);

  // 從 Supabase 雲端讀取資料
  const loadFromCloud = async function() {
    setSyncing(true);
    try {
      const { data, error } = await supabase
        .from('app_data')
        .select('data')
        .eq('id', 'main')
        .single();

      if (data && data.data) {
        setTeams(data.data.teams || []);
        setExpenses(data.data.companyExpenses || []);
      }
    } catch (e) {
      console.log("Cloud sync note: ", e);
    } finally {
      setSyncing(false);
    }
  };

  useEffect(function() {
    (async function() {
      try {
        const res = await storage.get(STORAGE_KEY);
        if (res && res.value) {
          const data = JSON.parse(res.value);
          setTeams(data.teams || []);
          setExpenses(data.companyExpenses || []);
        }
        await loadFromCloud();
      } catch (e) {
      } finally {
        setLoading(false);
      }
    })();

    // 訂閱 Supabase Realtime 即時推播
    const channel = supabase
      .channel('schema-db-changes')
      .on(
        'postgres_changes',
        { event: 'UPDATE', schema: 'public', table: 'app_data', filter: 'id=eq.main' },
        (payload) => {
          if (payload.new && payload.new.data) {
            setTeams(payload.new.data.teams || []);
            setExpenses(payload.new.data.companyExpenses || []);
          }
        }
      )
      .subscribe();

    return () => {
      supabase.removeChannel(channel);
    };
  }, []);

  // 防抖（Debounce）自動同步到 Supabase
  useEffect(function() {
    if (loading) return;
    
    // 同步到本地快照
    storage.set(STORAGE_KEY, JSON.stringify({ teams: teams, companyExpenses: expenses }));

    const timer = setTimeout(async () => {
      try {
        const { error } = await supabase
          .from('app_data')
          .upsert({ id: 'main', data: { teams: teams, companyExpenses: expenses }, updated_at: new Date() });
        setSaveError(!!error);
      } catch (e) {
        setSaveError(true);
      }
    }, 1000);

    return () => clearTimeout(timer);
  }, [teams, expenses, loading]);

  const years = useMemo(function() {
    const now = new Date().getFullYear();
    const set = new Set([now]);
    teams.forEach(function(t) { set.add(t.year); });
    expenses.forEach(function(e) { set.add(e.year); });
    return Array.from(set).sort(function(a, b) { return a - b; });
  }, [teams, expenses]);

  if (loading) {
    return (
      <div style={{ minHeight: "100vh", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <Loader2 className="animate-spin" color={C.text} size={28} />
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: C.bg }}>
      <header className="app-header" style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <h1 style={{
            fontSize: 22,
            fontWeight: 800,
            margin: 0,
            letterSpacing: "1.2px",
            fontFamily: '-apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang TC", "Microsoft JhengHei", sans-serif',
            background: "linear-gradient(135deg, #111827 0%, #374151 100%)",
            WebkitBackgroundClip: "text",
            WebkitTextFillColor: "transparent",
            display: "flex",
            alignItems: "center",
            gap: "8px"
          }}>
            銘海鑫商行 <span style={{ fontSize: 15, fontWeight: 500, opacity: 0.65, WebkitTextFillColor: "#6B7280" }}>｜ Operating System</span>
          </h1>
          <p style={{ color: saveError ? C.bad : C.good, fontSize: 12, margin: "6px 0 0 0", letterSpacing: "0.5px", fontWeight: 600 }}>
            {saveError ? "⚠ 資料同步失敗，請確認網路" : "● 已與 Supabase 雲端即時同步"}
          </p>
        </div>
        <button
          onClick={loadFromCloud}
          disabled={syncing}
          style={{
            padding: "6px 12px", borderRadius: 8, border: `1px solid ${C.border}`,
            background: "#FFFFFF", fontSize: 12, fontWeight: 600, cursor: "pointer",
            display: "flex", alignItems: "center", gap: 4, color: C.text
          }}
        >
          {syncing ? <Loader2 size={12} className="animate-spin" /> : <RefreshCw size={12} />}
          重新讀取
        </button>
      </header>

      <Navbar tab={tab} setTab={setTab} />

      <main style={{ padding: "16px 12px", maxWidth: 1100, margin: "0 auto" }}>
        {tab === "overview" && <OverviewDashboard teams={teams} expenses={expenses} years={years} onGoToTeams={function() { setTab("teams"); }} />}
        {tab === "teams" && <TeamsTab teams={teams} setTeams={setTeams} years={years} />}
        {tab === "brazil" && <BrazilTab teams={teams} setTeams={setTeams} years={years} />}
        {tab === "staff" && <StaffTab teams={teams} setTeams={setTeams} years={years} />}
        {tab === "expenses" && <ExpensesTab expenses={expenses} setExpenses={setExpenses} years={years} />}
        {tab === "monthly" && <MonthlyTab teams={teams} expenses={expenses} years={years} />}
        {tab === "compare" && <CompareTab teams={teams} expenses={expenses} years={years} />}
      </main>
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
} catch (err) {
  mhxShowError(String(err && err.message ? err.message : err));
}
</script>
</body>
</html>
