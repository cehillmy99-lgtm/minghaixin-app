<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>銘海鑫商行 | 公司管理系統</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

  <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative pb-20">
    <!-- 頂部標題 -->
    <header class="p-4 border-b text-center bg-white sticky top-0 z-10">
      <h1 class="text-lg font-bold">銘海鑫商行 | 公司管理系統</h1>
    </header>

    <!-- Toast 提示訊息 -->
    <div id="toast" class="hidden fixed top-4 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-lg shadow-md text-sm font-medium transition-all"></div>

    <!-- 分頁導覽按鈕 -->
    <nav class="flex border-b text-sm font-medium bg-gray-50">
      <button onclick="switchTab('overview')" id="tab-overview" class="flex-1 py-3 text-center border-b-2 border-blue-600 font-bold text-blue-600">📊 總覽</button>
      <button onclick="switchTab('brImport')" id="tab-brImport" class="flex-1 py-3 text-center border-b-2 border-transparent text-gray-500">📦 巴西進貨</button>
    </nav>

    <!-- 主要內容區 -->
    <main class="p-4 space-y-4">

      <!-- 📊 總覽分頁 (2x2 卡片宮格) -->
      <div id="page-overview" class="space-y-4">
        <h2 class="text-sm font-bold text-gray-600">月營運數據</h2>
        <div class="grid grid-cols-2 gap-3">
          <div class="border rounded-xl p-3 bg-stone-50">
            <p class="text-xs text-stone-500 font-bold">月營業額</p>
            <p class="text-base font-extrabold text-stone-800 mt-1">$100</p>
            <p class="text-[10px] text-stone-400 mt-0.5">1工作日·均 $100</p>
          </div>
          <div class="border rounded-xl p-3 bg-stone-50">
            <p class="text-xs text-stone-500 font-bold">月支出合計</p>
            <p class="text-base font-extrabold text-red-600 mt-1">$0</p>
            <p class="text-[10px] text-stone-400 mt-0.5">貨款+人事+支出</p>
          </div>
          <div class="border rounded-xl p-3 bg-stone-50">
            <p class="text-xs text-stone-500 font-bold">月實賺金額</p>
            <p class="text-base font-extrabold text-emerald-600 mt-1">+100</p>
            <p class="text-[10px] text-emerald-600 font-medium mt-0.5">🎉 本月盈餘</p>
          </div>
          <div class="border rounded-xl p-3 bg-stone-50">
            <p class="text-xs text-stone-500 font-bold">預估營業稅 (5%)</p>
            <p class="text-base font-extrabold text-stone-800 mt-1">$5</p>
            <p class="text-[10px] text-stone-400 mt-0.5">（含稅營收+運費5%）</p>
          </div>
        </div>
      </div>

      <!-- 📦 巴西進貨分頁 -->
      <div id="page-brImport" class="space-y-6 hidden">
        <!-- 巴幣儲值 2x2 欄位 -->
        <div class="border rounded-xl p-4 bg-white shadow-sm space-y-3">
          <h3 class="font-bold text-sm text-gray-700">巴幣儲值</h3>
          <div class="space-y-2">
            <input type="date" value="2026-07-20" class="w-full border rounded px-3 py-1.5 text-sm" />
            <div class="flex gap-2">
              <input type="number" placeholder="金額 (R$)" class="w-1/2 border rounded px-3 py-1.5 text-sm" />
              <input type="number" placeholder="匯率" class="w-1/2 border rounded px-3 py-1.5 text-sm" />
            </div>
          </div>
        </div>

        <!-- 💾 儲存至雲端按鈕 -->
        <button id="save-btn" onclick="saveToCloud('巴西進貨')" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold text-sm shadow active:scale-95 transition-all">
          💾 儲存至 Google 試算表
        </button>
      </div>

    </main>
  </div>

  <script>
    // ⚠️ 請把引號內的內容替換成你在 GAS 按「部署」拿到的網址（雙引號要保留）
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxfwDFijUoGzseTQMhPlI_8yAXlV9GY5KtuH-fgo8-XmLPXzgZ08j12cC1BZZmPxvIu/exec";

    // 切換頁籤
    function switchTab(tabName) {
      document.getElementById('page-overview').classList.add('hidden');
      document.getElementById('page-brImport').classList.add('hidden');
      document.getElementById('tab-overview').className = "flex-1 py-3 text-center border-b-2 border-transparent text-gray-500";
      document.getElementById('tab-brImport').className = "flex-1 py-3 text-center border-b-2 border-transparent text-gray-500";

      document.getElementById('page-' + tabName).classList.remove('hidden');
      document.getElementById('tab-' + tabName).className = "flex-1 py-3 text-center border-b-2 border-blue-600 font-bold text-blue-600";
    }

    // 顯示提示磚
    function showToast(message, isSuccess) {
      const toast = document.getElementById('toast');
      toast.innerText = message;
      toast.className = `fixed top-4 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-lg shadow-md text-sm font-medium ${isSuccess ? 'bg-green-600 text-white' : 'bg-red-600 text-white'}`;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // 送出資料至 GAS
    async function saveToCloud(sheetName) {
      const btn = document.getElementById('save-btn');
      if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL.includes("YOUR_GAS_WEB_APP_URL")) {
        showToast("❌ 請先貼上正確的 GAS 部署網址！", false);
        return;
      }

      btn.innerText = "⏳ 儲存同步中...";
      btn.disabled = true;

      try {
        await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          mode: 'no-cors', // 避開跨網域限制
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sheet: sheetName, timestamp: new Date().toLocaleString() })
        });
        showToast("✅ 資料已成功備份至 Google 試算表！", true);
      } catch (error) {
        showToast("❌ 儲存失敗，請檢查網路", false);
      } finally {
        btn.innerText = "💾 儲存至 Google 試算表";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
